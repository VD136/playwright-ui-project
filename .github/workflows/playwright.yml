name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      # run all tests, secrets injected here as environment variables
    - name: Run Playwright tests
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        DSALGO_USERNAME: ${{ secrets.DSALGO_USERNAME }}
        DSALGO_PASSWORD: ${{ secrets.DSALGO_PASSWORD }}
        REGISTRATION_PASSWORD: ${{ secrets.REGISTRATION_PASSWORD }}
        EXISTING_USERNAME: ${{ secrets.EXISTING_USERNAME }}
      run: npx playwright test
      # debug step — check allure-results folder contents on CI
    - name: Check allure-results folder
      if: ${{ !cancelled() }}
      run: |
        echo "=== allure-results contents ==="
        ls -la allure-results/ || echo "allure-results folder does not exist!"
        echo "=== number of files ==="
        find allure-results -type f | wc -l || echo "0 files found"
      # generate allure report from raw results
    - name: Generate Allure Report
      if: ${{ !cancelled() }}
      run: npx allure generate allure-results --clean -o allure-report
      #upload allure report so you can download it from GitHub Actions UI
    - name: Upload Allure Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30   
      # upload playwright html report as backup
    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
